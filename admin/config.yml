backend:
  name: git-gateway
  branch: main

media_folder: uploads
public_folder: /uploads

locale: de

collections:
  - name: "homepage"
    label: "Homepage"
    files:
      - label: "Homepage Inhalte"
        name: "home"
        file: "src/_data/home.json"
        fields:
          - { label: "Hero Text", name: "hero_text", widget: "text" }
          - { label: "Hero Bild", name: "hero_image", widget: "image" }
          - { label: "Über uns Text", name: "about_text", widget: "text" }
          - { label: "Haus am See Text", name: "haus_am_see_text", widget: "text" }
          - { label: "Haus am See Bild", name: "haus_am_see_image", widget: "image" }
          - { label: "Events Titel", name: "events_title", widget: "string" }
          - { label: "Events Text", name: "events_text", widget: "text" }
          - { label: "Events Bild", name: "events_image", widget: "image" }
          - { label: "Produkte Intro", name: "produkte_intro", widget: "text" }
          - { label: "Produkte Vollbild", name: "produkte_full_image", widget: "image" }
          - { label: "Produkte Text", name: "produkte_text", widget: "text" }

  - name: "produzentinnen"
    label: "Produzent:innen"
    files:
      - label: "Produzent:innen Seite"
        name: "produzentinnen"
        file: "src/_data/produzentinnen.json"
        fields:
          - { label: "Hero Bild", name: "hero_image", widget: "image" }
          - { label: "Intro Text", name: "intro_text", widget: "text" }
          - label: "Produzent:innen"
            name: "items"
            widget: "list"
            fields:
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Beschreibung", name: "text", widget: "text" }
              - { label: "Foto", name: "image", widget: "image" }
              - label: "Hintergrundfarbe"
                name: "background"
                widget: "select"
                options:
                  - { label: "Keiner", value: "" }
                  - { label: "Salbei", value: "bg-salbei" }
                  - { label: "Hellblau", value: "bg-hellblau" }
                  - { label: "Tiefblau", value: "bg-tiefblau" }
                  - { label: "Aubergine", value: "bg-aubergine" }
                  - { label: "Hellgrün", value: "bg-green-light" }
              - { label: "Bild links (umgekehrt)", name: "reversed", widget: "boolean", default: false }

  - name: "haus_am_see"
    label: "Haus am See"
    files:
      - label: "Haus am See Seite"
        name: "haus_am_see"
        file: "src/_data/haus_am_see.json"
        fields:
          - { label: "Hero Bild", name: "hero_image", widget: "image" }
          - { label: "Intro Text", name: "intro_text", widget: "text" }
          - label: "Slider Bilder"
            name: "slider_images"
            widget: "list"
            fields:
              - { label: "Bild", name: "url", widget: "image" }
              - { label: "Beschreibung", name: "alt", widget: "string" }
          - { label: "Kontaktperson Name", name: "contact_name", widget: "string" }
          - { label: "Kontaktperson Text", name: "contact_text", widget: "text" }
          - { label: "Kontaktperson Foto", name: "contact_image", widget: "image" }
          - label: "Leistungen (Bullets)"
            name: "contact_bullets"
            widget: "list"
            field: { label: "Punkt", name: "item", widget: "string" }
          - { label: "Buchung Titel", name: "booking_title", widget: "string" }
          - { label: "Buchung Text", name: "booking_text", widget: "text" }

  - name: "produkte"
    label: "Produkte"
    files:
      - label: "Produkte Seite"
        name: "produkte"
        file: "src/_data/produkte.json"
        fields:
          - { label: "Hero Bild", name: "hero_image", widget: "image" }
          - { label: "Intro Text", name: "intro_text", widget: "text" }
          - label: "Produkte"
            name: "items"
            widget: "list"
            fields:
              - { label: "Kategorie-Label", name: "tag", widget: "string" }
              - { label: "Titel", name: "title", widget: "string" }
              - { label: "Beschreibung", name: "text", widget: "text" }
              - { label: "Bild", name: "image", widget: "image" }
              - label: "Kategorie (Filter)"
                name: "category"
                widget: "select"
                options:
                  - { label: "Gemüse", value: "gemuese" }
                  - { label: "Früchte", value: "fruechte" }
                  - { label: "Kräuter", value: "kraeuter" }
                  - { label: "Eier & Milch", value: "eier" }
              - { label: "Bild links (umgekehrt)", name: "reversed", widget: "boolean", default: false }
              - label: "Hintergrundfarbe"
                name: "background"
                widget: "select"
                options:
                  - { label: "Keiner", value: "" }
                  - { label: "Salbei", value: "bg-salbei" }
                  - { label: "Hellblau", value: "bg-hellblau" }
                  - { label: "Tiefblau", value: "bg-tiefblau" }
                  - { label: "Aubergine", value: "bg-aubergine" }
                  - { label: "Hellgrün", value: "bg-green-light" }
          - { label: "Weitere Produkte Titel", name: "more_title", widget: "string" }
          - { label: "Weitere Produkte Text", name: "more_text", widget: "text" }
